<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage - Kelompok 20</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #000;
        }

        header h1 {
            margin: 0;
        }

        main {
            padding: 20px;
        }

        .members h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .member-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .member {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
        }

        .member img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border: 1px solid #000;
        }

        .member h3 {
            margin: 10px 0;
        }

        .member p {
            margin: 0;
        }

        .home-content {
            text-align: center;
            margin-top: 60px;
        }

        .home-content h2 {
            font-size: 36px;
            margin-bottom: 40px;
            color: #333;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <header>
        <h1>Kelompok 20</h1>
        <nav>
            <a href="home.html">Home</a> |
            <a href="materi.html">Materi</a> |
            <a href="about.html">About</a>
        </nav>
    </header>
    <main>
        <section class="home-content">
            <h2>Kelompok 20 LKM Informatika 2026</h2>
            <div class="button-container">
                <a href="materi.html" class="btn">Lihat Materi</a>
                <a href="about.html" class="btn">Lihat Anggota</a>
            </div>
        </section>
    </main>
    <script>
        // JavaScript untuk home page
        console.log('Home page loaded');
    </script>
</body>
</html>
