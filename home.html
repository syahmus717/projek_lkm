<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage - Kelompok 20</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background: linear-gradient(180deg, #f5f9ff 0%, #d9e8ff 50%, #c3defd 100%);
            color: #0f2366;
        }

        header {
            text-align: center;
            padding: 24px 20px;
            background: linear-gradient(135deg, rgba(15,35,102,0.95), rgba(70,130,255,0.85));
            color: white;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
        }

        header h1 {
            margin: 0;
            font-size: 2rem;
            letter-spacing: 0.04em;
        }

        nav {
            margin-top: 10px;
        }

        nav a {
            color: rgba(255,255,255,0.9);
            text-decoration: none;
            font-weight: 600;
            margin: 0 10px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: #e0f2ff;
        }

        main {
            padding: 40px 20px 60px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .home-content {
            text-align: center;
            margin-top: 60px;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            box-shadow: 0 24px 60px rgba(0, 48, 128, 0.12);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .home-content h2 {
            font-size: clamp(2.5rem, 4vw, 3.6rem);
            margin-bottom: 40px;
            color: #0f2366;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-block;
            padding: 16px 34px;
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            color: white;
            text-decoration: none;
            border-radius: 999px;
            font-size: 1rem;
            font-weight: 700;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 14px 28px rgba(59, 130, 246, 0.22);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 30px rgba(59, 130, 246, 0.28);
        }

        .footer-note {
            text-align: center;
            margin-top: 40px;
            color: #3a5f8f;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <header>
        <h1>Kelompok 20</h1>
        <nav>
            <a href="home.html">Home</a>
            <a href="materi.html">Materi</a>
            <a href="about.html">About</a>
        </nav>
    </header>
    <main>
        <section class="home-content">
            <h2>Kelompok 20 LKM Informatika 2026</h2>
            <div class="button-container">
                <a href="materi.html" class="btn">Lihat Materi</a>
                <a href="about.html" class="btn">Lihat Anggota</a>
            </div>
        </section>
    </main>
    <script>
        // JavaScript untuk home page
        console.log('Home page loaded');
    </script>
</body>
</html>
